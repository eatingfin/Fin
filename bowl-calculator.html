    fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }

    select { width: 100%; padding: .5rem; font-size: 1rem; }
    #summary { background: #f7f7f7; border-radius: 8px; padding: 1rem; position: sticky; top: 1rem; }
    #summary h2 { margin-top: 0; font-size: 1.1rem; }
    .row { display: flex; justify-content: space-between; padding: .25rem 0; border-bottom: 1px solid #eee; }
    .row:last-child { border: none; }
  </style>

// ─────────────────────────────────────────────
// Build UI
// ─────────────────────────────────────────────
const form = document.getElementById("bowl-form");
const totalsDiv = document.getElementById("totals");
const singleSelect = ["Base", "Protein", "Sauces"];  // categories allowing only one choice
for (const [category, items] of Object.entries(ingredients)) {
  const fieldset = document.createElement("fieldset");
  fieldset.innerHTML = `<legend>${category}</legend>`;
  if (singleSelect.includes(category)) {
    // dropdown
    const sel = document.createElement("select");
    sel.name = category;
    sel.innerHTML = `<option value="">— none —</option>` +
      items.map((it, i) => `<option value="${i}">${it.name}</option>`).join("");
    sel.addEventListener("change", calculate);
    fieldset.appendChild(sel);
  } else {
    // checkboxes
    items.forEach((it, i) => {
      const lbl = document.createElement("label");
      lbl.innerHTML = `<input type="checkbox" name="${category}" value="${i}"> ${it.name}`;
      lbl.querySelector("input").addEventListener("change", calculate);
      fieldset.appendChild(lbl);
    });
  }
  form.appendChild(fieldset);
}
// ─────────────────────────────────────────────
// Calculate totals
// ─────────────────────────────────────────────
function calculate() {
  const totals = { kcal: 0, protein: 0, fat: 0, carbs: 0, fiber: 0, sodium: 0, sugar: 0 };
  for (const [category, items] of Object.entries(ingredients)) {
    if (singleSelect.includes(category)) {
      const idx = form.querySelector(`select[name="${category}"]`).value;
      if (idx !== "") addItem(items[idx]);
    } else {
      form.querySelectorAll(`input[name="${category}"]:checked`).forEach(cb => {
        addItem(items[cb.value]);
      });
    }
  }
  function addItem(it) {
    for (const key of Object.keys(totals)) totals[key] += it[key];
  }
  totalsDiv.innerHTML = `
    <div class="row"><span>Calories</span><strong>${totals.kcal.toFixed(0)} kcal</strong></div>
    <div class="row"><span>Protein</span><strong>${totals.protein.toFixed(1)} g</strong></div>
    <div class="row"><span>Fat</span><strong>${totals.fat.toFixed(1)} g</strong></div>
    <div class="row"><span>Carbs</span><strong>${totals.carbs.toFixed(1)} g</strong></div>
    <div class="row"><span>Fiber</span><strong>${totals.fiber.toFixed(1)} g</strong></div>
    <div class="row"><span>Sodium</span><strong>${totals.sodium.toFixed(0)} mg</strong></div>
    <div class="row"><span>Sugar</span><strong>${totals.sugar.toFixed(1)} g</strong></div>
  `;
}
calculate(); // init
