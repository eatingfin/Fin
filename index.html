// BUILD DIY SECTION (all MULTI select)
// ------------------------------------------------------------
const diySection = document.getElementById('diy-section');

Object.entries(diy).forEach(([groupName, items]) => {
  const fs = document.createElement('fieldset');
  fs.innerHTML = `<legend>${groupName}</legend>`;
  items.forEach((item, idx) => {
    const label = document.createElement('label');
    label.innerHTML = `
      <input type="checkbox" data-group="${groupName}" value="${idx}">
      ${item.name}
    `;
    label.querySelector('input').addEventListener('change', calculateTotals);
    fs.appendChild(label);
  });
  diySection.appendChild(fs);
});

// ------------------------------------------------------------
// BUILD PREMADE (each group SINGLE choice)
// ------------------------------------------------------------
const menuSection = document.getElementById('menu-section');

Object.entries(menu).forEach(([groupName, items]) => {
  const fs = document.createElement('fieldset');
  fs.innerHTML = `<legend>${groupName}</legend>`;
  const select = document.createElement('select');
  select.innerHTML = `<option value="">— none —</option>` + 
    items.map((item,i)=>`<option value="${i}">${item.name}</option>`).join("");
  select.dataset.group = groupName;
  select.addEventListener('change', calculateTotals);
  fs.appendChild(select);
  menuSection.appendChild(fs);
});

// ------------------------------------------------------------
function calculateTotals() {
  const totals = {kcal:0, protein:0, fat:0, carbs:0, fiber:0, sodium:0, sugar:0};

  // DIY bowls (multiple selections)
  document.querySelectorAll('#diy-section input[type=checkbox]:checked')
    .forEach(el => {
      const group = el.dataset.group;
      const item = diy[group][el.value];
      Object.keys(totals).forEach(k => totals[k] += item[k]);
    });

  // Premade (single per category)
  document.querySelectorAll('#menu-section select')
    .forEach(sel => {
      if (sel.value !== "") {
        const group = sel.dataset.group;
        const item = menu[group][sel.value];
        Object.keys(totals).forEach(k => totals[k] += item[k]);
      }
    });

  // Display
  document.getElementById('summary').innerHTML = `
    <div class="summary-row"><span>Calories</span><strong>${totals.kcal.toFixed(0)} kcal</strong></div>
    <div class="summary-row"><span>Protein</span><strong>${totals.protein.toFixed(1)} g</strong></div>
    <div class="summary-row"><span>Fat</span><strong>${totals.fat.toFixed(1)} g</strong></div>
    <div class="summary-row"><span>Carbs</span><strong>${totals.carbs.toFixed(1)} g</strong></div>
    <div class="summary-row"><span>Fiber</span><strong>${totals.fiber.toFixed(1)} g</strong></div>
    <div class="summary-row"><span>Sodium</span><strong>${totals.sodium.toFixed(0)} mg</strong></div>
    <div class="summary-row"><span>Sugar</span><strong>${totals.sugar.toFixed(1)} g</strong></div>
  `;
}
